name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (optional - defaults to manifest.json)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Validate, build & publish to otzaria.org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional manual version override -> write it into manifest.json so the
      # Action packages and publishes that version.
      - name: Sync manifest version (workflow_dispatch override)
        if: ${{ inputs.version != '' }}
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
            m.version = process.env.NEW_VERSION;
            fs.writeFileSync("manifest.json", JSON.stringify(m, null, 2) + "\n");
            console.log("manifest.json version -> " + m.version);
          '

      - name: Read version from manifest
        id: meta
        run: |
          echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      # Validate the plugin, build the .otzplugin, and publish it to the store.
      # Publishing runs only because the three secrets are set (and never on PRs).
      - name: Validate, build & publish
        id: otzaria
        uses: Otzaria/otzaria-plugin-validator@v1
        with:
          path: .
          otzaria-user: ${{ secrets.OTZARIA_USER }}
          otzaria-password: ${{ secrets.OTZARIA_PASSWORD }}
          otzaria-plugin-id: ${{ secrets.OTZARIA_PLUGIN_ID }}
          base-url: ${{ vars.OTZARIA_BASE_URL }}

      # Attach the freshly built .otzplugin to a GitHub Release (only when a new
      # version was actually published, so re-runs of the same version are skipped).
      - name: Create GitHub Release
        if: ${{ steps.otzaria.outputs.published == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.otzaria.outputs.plugin-file }}
          body: |
            ## קידוש החודש — v${{ steps.meta.outputs.version }}

            איורים אינטראקטיביים להבנת מהלך גרמי השמיים: מופעי הירח, מהלך השמש היומי לאורך שנת החמה, ומיקום כוכבי הלכת לפי תאריך.

            ### התקנה
            הורד את הקובץ `.otzplugin` למטה, ובאוצריא:
            **כלים → 🧩 תוספים → ⊕ התקן תוסף חדש**, ובחר את הקובץ.

            ### Checksum
            ```
            SHA-256: ${{ steps.otzaria.outputs.sha256 }}
            ```
